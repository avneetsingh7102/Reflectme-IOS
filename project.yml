name: Reflect
options:
  bundleIdPrefix: com.reflect
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES

targets:
  Reflect:
    type: application
    platform: iOS
    dependencies:
      - package: Supabase
    sources:
      - path: Reflect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reflect.app
        INFOPLIST_KEY_CFBundleDisplayName: Reflect
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Reflect uses your microphone to record voice journals."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Reflect transcribes your voice to create your journal entry."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    from: 2.0.0
